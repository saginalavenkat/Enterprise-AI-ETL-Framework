name: Enterprise AI ETL Framework CI

on:
  push:
    branches:
      - main
      - feature/**

  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python Version
        run: python --version

      - name: Verify Imports
        run: |
          python -c "import agents"
          python -c "import services"
          python -c "import integrations"
          python -c "import tools"

      - name: Run Unit Tests
        run: |
          pytest tests